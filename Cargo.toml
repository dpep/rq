[package]
name = "rq"
version = "0.1.0"
edition = "2024"
description = "A code navigation engine — reach the definition you want, fast."
license = "MIT"

[[bin]]
name = "rq"
path = "src/main.rs"

[lib]
name = "rq"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
ignore = "0.4"
rusqlite = { version = "0.32", features = ["bundled"] }
tree-sitter = "0.25"
tree-sitter-ruby = "0.23"
